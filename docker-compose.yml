services:
  db:
    image: mongo:7.0
    container_name: echo-island-db
    restart: always
    ports:
      - "27223:27017"
    environment:
      - MONGO_INITDB_DATABASE=echo_island
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: echo-island-backend
    restart: always
    ports:
      - "8223:8223"
    environment:
      - PORT=8223
      - MONGO_URI=mongodb://db:27017/echo_island
      - WS_PATH=/ws
      - LOG_LEVEL=info
      - NODE_ENV=production
    depends_on:
      db:
        condition: service_healthy

  seed:
    build: ./backend
    container_name: echo-island-seed
    command: npm run seed
    environment:
      - MONGO_URI=mongodb://db:27017/echo_island
      - LOG_LEVEL=info
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

volumes:
  mongo_data:
    driver: local
