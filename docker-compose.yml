services:
  db:
    image: mongo:7.0
    container_name: echo-island-db
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27223}:27017"
    environment:
      - MONGO_INITDB_DATABASE=echo_island
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - echo-island-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: echo-island-backend
    restart: unless-stopped
    ports:
      - "${PORT:-8223}:8223"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=8223
      - MONGO_URI=mongodb://db:27017/echo_island
      - WS_PATH=/ws
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - JWT_SECRET=${JWT_SECRET:-echo-island-dev-secret-change-me}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - echo-island-net

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: echo-island-seed
    command: npm run seed
    environment:
      - MONGO_URI=mongodb://db:27017/echo_island
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      - echo-island-net

volumes:
  mongo_data:
    driver: local
  backend_uploads:
    driver: local
  backend_logs:
    driver: local

networks:
  echo-island-net:
    driver: bridge
