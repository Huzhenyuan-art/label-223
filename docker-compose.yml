services:
  db:
    image: mongo:7.0
    container_name: echo-island-db
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27223}:27017"
    environment:
      - MONGO_INITDB_DATABASE=echo_island
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - echo-island-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: echo-island-backend
    restart: unless-stopped
    ports:
      - "${PORT:-8223}:8223"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=8223
      - MONGO_URI=mongodb://db:27017/echo_island
      - WS_PATH=${WS_PATH:-/ws}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - JWT_SECRET=${JWT_SECRET:-echo-island-dev-secret-change-me}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-local}
      - LOCAL_UPLOAD_DIR=${LOCAL_UPLOAD_DIR:-uploads}
      - LOCAL_PUBLIC_BASE_URL=${LOCAL_PUBLIC_BASE_URL:-http://localhost:8223/uploads}
      - MAX_IMAGE_SIZE=${MAX_IMAGE_SIZE:-10485760}
      - MAX_AUDIO_SIZE=${MAX_AUDIO_SIZE:-52428800}
      - RECOMMENDATION_ENABLED=${RECOMMENDATION_ENABLED:-true}
      - RECOMMENDATION_FALLBACK=${RECOMMENDATION_FALLBACK:-true}
      - RECOMMENDATION_SCHEDULER_ENABLED=${RECOMMENDATION_SCHEDULER_ENABLED:-true}
      - TAG_PRECOMPUTE_CRON=${TAG_PRECOMPUTE_CRON:-*/30 * * * *}
      - HOT_SNAPSHOT_CRON=${HOT_SNAPSHOT_CRON:-*/15 * * * *}
      - CACHE_CLEANUP_CRON=${CACHE_CLEANUP_CRON:-0 * * * *}
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - echo-island-net

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: echo-island-seed
    command: npm run seed
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - MONGO_URI=mongodb://db:27017/echo_island
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - JWT_SECRET=${JWT_SECRET:-echo-island-dev-secret-change-me}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      - echo-island-net

volumes:
  mongo_data:
    driver: local
  backend_uploads:
    driver: local
  backend_logs:
    driver: local

networks:
  echo-island-net:
    driver: bridge
