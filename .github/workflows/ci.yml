name: Echo Island CI

on:
  push:
    branches: [main, develop, "feature/**"]
    paths:
      - "backend/**"
      - ".github/workflows/**"
      - "docker-compose.yml"
      - "package*.json"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/**"
      - "docker-compose.yml"

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Verify Node.js and npm versions
        working-directory: ./backend
        run: |
          node --version
          npm --version
          node -e "const pkg = require('./package.json'); console.log('engines:', pkg.engines)"

      - name: Run unit tests
        working-directory: ./backend
        env:
          NODE_ENV: test
          JWT_SECRET: echo-island-test-secret-key-for-testing
          JWT_EXPIRES_IN: 1h
          RECOMMENDATION_ENABLED: "false"
          RECOMMENDATION_SCHEDULER_ENABLED: "false"
        run: npm run test:unit

      - name: Run integration tests
        working-directory: ./backend
        env:
          NODE_ENV: test
          JWT_SECRET: echo-island-test-secret-key-for-testing
          JWT_EXPIRES_IN: 1h
          RECOMMENDATION_ENABLED: "false"
          RECOMMENDATION_SCHEDULER_ENABLED: "false"
        run: npm run test:integration

      - name: Run full test suite with coverage
        working-directory: ./backend
        if: matrix.node-version == '20.x'
        env:
          NODE_ENV: test
          JWT_SECRET: echo-island-test-secret-key-for-testing
          JWT_EXPIRES_IN: 1h
          RECOMMENDATION_ENABLED: "false"
          RECOMMENDATION_SCHEDULER_ENABLED: "false"
        run: npm run test:coverage

      - name: Upload coverage report
        if: matrix.node-version == '20.x' && success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage/
          retention-days: 7

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: echo-island-backend:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

      - name: Verify Docker image
        run: |
          docker images echo-island-backend:ci-test
          docker inspect echo-island-backend:ci-test --format='{{.Size}}'

  service-integration:
    name: Service Integration Test
    runs-on: ubuntu-latest
    needs: docker-build

    services:
      mongo:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand(\"ping\").ok' | mongosh --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Load Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true
          tags: echo-island-backend:ci-test
          cache-from: type=gha

      - name: Start backend service
        run: |
          docker run -d \
            --name echo-island-test-backend \
            --network host \
            -e NODE_ENV=test \
            -e PORT=8223 \
            -e MONGO_URI=mongodb://127.0.0.1:27017/echo_island_test \
            -e JWT_SECRET=echo-island-test-secret-key-for-testing \
            -e JWT_EXPIRES_IN=1h \
            -e RECOMMENDATION_ENABLED=false \
            -e RECOMMENDATION_SCHEDULER_ENABLED=false \
            echo-island-backend:ci-test
          sleep 10

      - name: Wait for service to be ready
        run: |
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:8223/health; then
              echo "Service is ready!"
              exit 0
            fi
            echo "Waiting for service... attempt $i"
            sleep 2
          done
          echo "Service failed to start"
          docker logs echo-island-test-backend
          exit 1

      - name: Run data initialization (seed)
        run: |
          docker run --rm \
            --network host \
            -e MONGO_URI=mongodb://127.0.0.1:27017/echo_island_test \
            -e LOG_LEVEL=error \
            --entrypoint node \
            echo-island-backend:ci-test \
            seed/init.js

      - name: Run API health check and endpoints validation
        run: |
          echo "=== Health Check ==="
          curl -sf http://127.0.0.1:8223/health | python3 -m json.tool
          
          echo ""
          echo "=== Test Login API ==="
          RESPONSE=$(curl -s -X POST http://127.0.0.1:8223/api/users/login \
            -H "Content-Type: application/json" \
            -d '{"account":"admin","password":"password1"}')
          echo "$RESPONSE" | python3 -m json.tool
          
          TOKEN=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('data',{}).get('token',''))")
          
          if [ -z "$TOKEN" ]; then
            echo "ERROR: Failed to get auth token"
            docker logs echo-island-test-backend
            exit 1
          fi
          
          echo ""
          echo "=== Test Feed API with Auth ==="
          curl -sf -H "Authorization: Bearer $TOKEN" http://127.0.0.1:8223/api/feed/ocean | python3 -m json.tool

      - name: Collect service logs on failure
        if: failure()
        run: docker logs echo-island-test-backend

      - name: Cleanup
        if: always()
        run: docker rm -f echo-island-test-backend || true
