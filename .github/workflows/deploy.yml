name: Echo Island Deploy

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-backend

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

      - name: Image digest output
        run: echo "Pushed image digest ${{ steps.build-and-push.outputs.digest }}"

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to staging server
        run: |
          echo "=== Deploying to Staging ==="
          echo "Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          
          if [ -n "${{ secrets.STAGING_DEPLOY_KEY }}" ]; then
            echo "Deployment hook configured"
          else
            echo "WARNING: Staging deployment not configured. Set STAGING_DEPLOY_KEY secret to enable automatic deployment."
            echo "To deploy manually, run on staging server:"
            echo "  docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
            echo "  docker compose up -d backend"
          fi

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Production deployment gate
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "=== Production Deployment Triggered Manually ==="
          echo "Ref: ${{ github.ref }}"

      - name: Deploy to production server
        run: |
          echo "=== Deploying to Production ==="
          echo "Image tag: ${GITHUB_REF_NAME:-latest}"
          
          if [ -n "${{ secrets.PRODUCTION_DEPLOY_KEY }}" ]; then
            echo "Deployment hook configured"
          else
            echo "WARNING: Production deployment not configured."
            echo "To deploy manually, ensure you have the correct .env file, then run:"
            echo "  docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${GITHUB_REF_NAME:-latest}"
            echo "  docker compose up -d backend"
          fi

      - name: Run smoke tests
        if: vars.PRODUCTION_URL != ''
        run: |
          echo "=== Running Production Smoke Tests ==="
          HEALTH_URL="${{ vars.PRODUCTION_URL }}/health"
          echo "Checking: $HEALTH_URL"
          
          for i in {1..10}; do
            if curl -sf "$HEALTH_URL"; then
              echo "Production health check passed!"
              exit 0
            fi
            echo "Attempt $i failed, retrying..."
            sleep 5
          done
          
          echo "ERROR: Production health check failed after 10 attempts"
          exit 1
